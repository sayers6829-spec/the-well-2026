
<!DOCTYPE html>
<html>
<head>
    <title>THE WELL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .animating { animation: pulse 4s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-2xl tracking-widest text-teal-500 mb-10">THE WELL</h1>
    <div id="circle" class="w-48 h-48 border-4 border-teal-500 rounded-full flex items-center justify-center mb-10">
        <span id="timer" class="text-5xl font-mono">45</span>
    </div>
    <button onclick="run()" id="btn" class="bg-teal-600 px-8 py-3 rounded-full font-bold">BEGIN ANCHOR</button>

    <script>
        function run() {
            let time = 45;
            document.getElementById('btn').style.display = 'none';
            document.getElementById('circle').classList.add('animating');
            const interval = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = time;
                if (time <= 0) {
                    clearInterval(interval);
                    document.getElementById('circle').classList.remove('animating');
                    document.getElementById('timer').innerText = "REST";
                    document.getElementById('btn').style.display = 'block';
                    document.getElementById('btn').innerText = "RESTART";
                }
            }, 1000);
        }
    </script>
</body>
</html>
