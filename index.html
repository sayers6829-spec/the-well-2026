<!DOCTYPE html>
<html>
<head>
    <title>THE WELL</title>
    <style>
        /* This is the "Paint" - kept inside the house */
        body { 
            background-color: #0f172a; 
            color: #14b8a6; 
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .circle {
            width: 200px;
            height: 200px;
            border: 4px solid #14b8a6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 2rem;
            transition: all 0.5s ease;
        }
        .btn {
            background-color: #14b8a6;
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .breathing {
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 5px; text-transform: uppercase; margin-bottom: 30px;">The Well</h1>

    <div id="mainCircle" class="circle">45</div>

    <button id="startBtn" class="btn" onclick="startAnchor()">BEGIN ANCHOR</button>

    <script>
        function startAnchor() {
            let time = 45;
            const display = document.getElementById('mainCircle');
            const btn = document.getElementById('startBtn');
            
            btn.style.visibility = 'hidden';
            display.classList.add('breathing');

            const timer = setInterval(() => {
                time--;
                display.innerText = time;
                if (time <= 0) {
                    clearInterval(timer);
                    display.classList.remove('breathing');
                    display.innerText = "REST";
                    btn.style.visibility = 'visible';
                    btn.innerText = "RESTART";
                }
            }, 1000);
        }
    </script>
</body>
</html>
