<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WELL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .teal-circle { 
            height: 200px; width: 200px; 
            border: 4px solid #14b8a6; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
        }
        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }
        .animating { animation: breathe 6s infinite ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-3xl tracking-widest text-teal-500 uppercase mb-8">The Well</h1>
    
    <div id="circle" class="teal-circle mb-10">
        <span id="display" class="text-4xl font-mono">45</span>
    </div>

    <button onclick="start()" id="btn" class="bg-teal-600 px-10 py-3 rounded-full hover:bg-teal-500 transition-all">
        Begin Anchor
    </button>

    <script>
        let count = 45;
        let running = false;

        function start() {
            if (running) return;
            running = true;
            document.getElementById('btn').style.opacity = '0.3';
            document.getElementById('circle').classList.add('animating');
            
            const timer = setInterval(() => {
                count--;
                document.getElementById('display').innerText = count;
                
                if (count <= 0) {
                    clearInterval(timer);
                    document.getElementById('circle').classList.remove('animating');
                    document.getElementById('display').innerText = "Rest";
                    document.getElementById('btn').style.opacity = '1';
                    count = 45;
                    running = false;
                }
            }, 1000);
        }
    </script>
</body>
</html>
