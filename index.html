<!DOCTYPE html>
<html>
<head>
    <title>THE WELL | 4-4-6 | MASTER</title>
    <style>
        body { 
            background-color: #0f172a; color: #14b8a6; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .circle {
            width: 220px; height: 220px; border: 4px solid #14b8a6; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1s ease-in-out;
        }
        .label { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.7; }
        .timer { font-size: 3.5rem; font-weight: bold; }
        .btn {
            margin-top: 20px; background-color: #14b8a6; color: #0f172a;
            border: none; padding: 12px 30px; border-radius: 30px;
            font-weight: bold; cursor: pointer; letter-spacing: 2px;
        }
        .inhale { transform: scale(1.25); box-shadow: 0 0 60px #14b8a6; }
        .hold { transform: scale(1.25); opacity: 1; }
        .exhale { transform: scale(1); opacity: 0.4; }
    </style>
</head>
<body>

    <div id="status" class="label">RESTORE THE SILENCE</div>
    
    <div id="mainCircle" class="circle">
        <div id="phaseText" style="font-size: 1rem; letter-spacing: 1px;">THE WELL</div>
        <div id="timer" class="timer">--</div>
    </div>

    <button id="startBtn" class="btn" onclick="runAnchor()">BEGIN ANCHOR</button>
    <p id="audioNotice" style="font-size: 10px; margin-top: 15px; opacity: 0.5;">Ensure device is not on Silent/Vibrate</p>

    <script>
        // Directly linking a very reliable public singing bowl sound
        const bell = new Audio('https://cdn.pixabay.com/audio/2022/03/24/audio_730604c55a.mp3');
        bell.load(); // Force the browser to start downloading immediately

        async function runAnchor() {
            const circle = document.getElementById('mainCircle');
            const timerDisp = document.getElementById('timer');
            const phaseDisp = document.getElementById('phaseText');
            const statusDisp = document.getElementById('status');
            const btn = document.getElementById('startBtn');

            // 1. THE HANDSHAKE: Play and immediately pause to "unlock" audio
            try {
                await bell.play();
                bell.pause();
                bell.currentTime = 0;
            } catch (e) {
                console.log("Audio requires user gesture");
            }

            btn.style.visibility = 'hidden';
            statusDisp.innerText = "CENTERING...";
            
            // Initial Bell
            bell.play();

            // 3-second settle
            for(let i=3; i>0; i--) {
                timerDisp.innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }

            // 4-4-6 Cycle
            await breathePhase(circle, phaseDisp, timerDisp, "INHALE", 4, "inhale");
            await breathePhase(circle, phaseDisp, timerDisp, "HOLD", 4, "hold");
            await breathePhase(circle, phaseDisp, timerDisp, "EXHALE", 6, "exhale");

            // Final Bell
            bell.play();

            timerDisp.innerText = "REST";
            phaseDisp.innerText = "DONE";
            statusDisp.innerText = "THE SLIGHT EDGE REMAINS.";
            btn.style.visibility = 'visible';
            btn.innerText = "AGAIN";
        }

        async function breathePhase(circle, phaseDisp, timerDisp, name, seconds, cssClass) {
            phaseDisp.innerText = name;
            circle.className = "circle " + cssClass;
            for(let i = seconds; i > 0; i--) {
                timerDisp.innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }
        }
    </script>
</body>
</html>
